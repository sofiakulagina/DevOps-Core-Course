name: Python CI and Docker Release

on:
  push:
    branches:
      - main
      - lab3
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: app_python/requirements.txt

      - name: Install dependencies
        id: deps
        run: |
          START=$(date +%s)
          python -m pip install --upgrade pip
          pip install -r app_python/requirements.txt
          pip install ruff
          END=$(date +%s)
          echo "install_seconds=$((END-START))" >> "$GITHUB_OUTPUT"

      - name: Lint (ruff)
        run: ruff check app_python

      - name: Run unit tests
        run: python -m unittest discover -s app_python/tests -v

      - name: Dependency cache report
        if: always()
        run: |
          echo "### Dependency install metrics (Python ${{ matrix.python-version }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- cache-hit: \`${{ steps.setup-python.outputs.cache-hit }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- install-seconds: \`${{ steps.deps.outputs.install_seconds }}\`" >> "$GITHUB_STEP_SUMMARY"

  security:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app_python/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_python/requirements.txt

      - name: Set up Snyk CLI
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@master

      - name: Run Snyk scan (high and critical)
        if: ${{ env.SNYK_TOKEN != '' }}
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        run: snyk test --file=app_python/requirements.txt --severity-threshold=high

      - name: Snyk token reminder
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN secret is not configured; Snyk scan skipped."

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 20
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-info-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app_python
          file: app_python/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
